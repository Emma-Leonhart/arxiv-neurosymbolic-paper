<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Feature Transforms">
  <meta property="og:description" content="Interactive demo of how polynomial feature transforms let linear models fit nonlinear data.">
  <meta property="og:url" content="https://emmaleonhart.com/feature-transforms/">
  <title>Feature Transforms</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #d0d0dc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
    .container { max-width: 900px; width: 100%; }
    .back { display: inline-block; color: #7c8cf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e8e8f0; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { color: #8888a0; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .canvas-wrap { width: 100%; border: 1px solid #1e1e2a; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #0a0a0f; }
    canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .ctrl-btn { padding: 8px 18px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { border-color: #3a3a50; background: #16161f; }
    .ctrl-btn.active { border-color: #7c8cf8; background: rgba(124, 140, 248, 0.1); color: #e8e8f0; }
    .ctrl-sep { width: 1px; background: #1e1e2a; align-self: stretch; margin: 0 4px; }
    #math-panel { background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 14px; }
    .formula-card { background: #0e0e16; border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.8rem; color: #9898ac; line-height: 1.7; }
    .formula-title { font-size: 0.7rem; color: #666880; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .formula-body { color: #b0b0cc; }
    .val-pos { color: #34d399; } .val-neg { color: #f43f5e; } .val-zero { color: #666880; } .val-warn { color: #f59e0b; }
    .insight-box { margin-top: 14px; padding: 10px 12px; background: rgba(124, 140, 248, 0.04); border-left: 3px solid #7c8cf8; border-radius: 0 6px 6px 0; font-size: 0.82rem; line-height: 1.5; color: #9898ac; }
    @media (max-width: 480px) { body { padding: 24px 12px; } h1 { font-size: 1.3rem; } }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>Feature Transforms</h1>
    <p class="subtitle">Click on the canvas to add data points. A polynomial of the chosen degree is fitted using least squares. Higher degree = more flexible, but watch out for overfitting.</p>
    <div class="controls">
      <button class="ctrl-btn active" data-degree="1">Degree 1</button>
      <button class="ctrl-btn" data-degree="2">Degree 2</button>
      <button class="ctrl-btn" data-degree="3">Degree 3</button>
      <button class="ctrl-btn" data-degree="5">Degree 5</button>
      <button class="ctrl-btn" data-degree="9">Degree 9</button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn" id="btn-sine">Sine data</button>
      <button class="ctrl-btn" id="btn-quadratic">Quadratic data</button>
      <button class="ctrl-btn" id="btn-linear">Linear data</button>
      <button class="ctrl-btn" id="btn-clear">Clear</button>
    </div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div id="math-panel"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
