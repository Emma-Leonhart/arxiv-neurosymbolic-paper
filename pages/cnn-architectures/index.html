<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="CNN Architecture Timeline">
  <meta property="og:description" content="Interactive timeline of CNN architectures from LeNet to ConvNeXt — see what each one introduced.">
  <meta property="og:url" content="https://emmaleonhart.com/cnn-architectures/">
  <title>CNN Architecture Timeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #d0d0dc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
    .container { max-width: 960px; width: 100%; }
    .back { display: inline-block; color: #7c8cf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e8e8f0; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { color: #8888a0; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .canvas-wrap { width: 100%; border: 1px solid #1e1e2a; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #0a0a0f; }
    canvas { display: block; width: 100%; touch-action: none; }
    .controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .arch-btn { padding: 6px 14px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .arch-btn:hover { border-color: #3a3a50; background: #16161f; }
    .arch-btn.active { border-color: var(--arch-color, #7c8cf8); background: rgba(124, 140, 248, 0.08); color: #e8e8f0; }
    #info-panel { background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 16px; }
    .arch-header { border-left: 3px solid; padding-left: 12px; margin-bottom: 14px; }
    .arch-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .arch-stats { display: flex; gap: 16px; font-size: 0.82rem; color: #9898ac; flex-wrap: wrap; }
    .arch-stats strong { color: #d0d0dc; }
    .arch-novelty { background: #0e0e16; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; font-size: 0.88rem; line-height: 1.5; }
    .arch-details { margin-bottom: 12px; }
    .detail-item { font-size: 0.82rem; color: #9898ac; line-height: 1.7; padding-left: 4px; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 8px 0; border-top: 1px solid #1e1e2a; margin-bottom: 12px; }
    .legend-item { font-size: 0.72rem; color: #9898ac; display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .insight-box { padding: 10px 12px; background: rgba(124, 140, 248, 0.04); border-left: 3px solid #7c8cf8; border-radius: 0 6px 6px 0; font-size: 0.82rem; line-height: 1.5; color: #9898ac; }
    @media (max-width: 480px) { body { padding: 24px 12px; } h1 { font-size: 1.3rem; } .arch-stats { flex-direction: column; gap: 4px; } }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>CNN Architecture Timeline</h1>
    <p class="subtitle">From LeNet's 60K parameters to ConvNeXt's transformer-era modernization. Click an architecture to see its structure, key innovations, and how it advanced the field.</p>
    <div class="controls">
      <button class="arch-btn active" data-idx="0" style="--arch-color:#7c8cf8">LeNet-5</button>
      <button class="arch-btn" data-idx="1" style="--arch-color:#38bdf8">AlexNet</button>
      <button class="arch-btn" data-idx="2" style="--arch-color:#a78bfa">VGGNet</button>
      <button class="arch-btn" data-idx="3" style="--arch-color:#34d399">GoogLeNet</button>
      <button class="arch-btn" data-idx="4" style="--arch-color:#f59e0b">ResNet</button>
      <button class="arch-btn" data-idx="5" style="--arch-color:#f43f5e">ConvNeXt</button>
    </div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div id="info-panel"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
