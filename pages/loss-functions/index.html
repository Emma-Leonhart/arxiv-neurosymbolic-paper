<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Loss Functions">
  <meta property="og:description" content="Interactive comparison of ML loss functions — Step, MSE, Cross-Entropy, and the Softmax connection.">
  <meta property="og:url" content="https://emmaleonhart.com/loss-functions/">
  <title>Loss Functions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #d0d0dc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
    .container { max-width: 960px; width: 100%; }
    .back { display: inline-block; color: #7c8cf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e8e8f0; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { color: #8888a0; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .canvas-wrap { width: 100%; border: 1px solid #1e1e2a; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #0a0a0f; }
    canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .loss-btn { padding: 6px 14px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .loss-btn:hover { border-color: #3a3a50; background: #16161f; }
    .loss-btn.active { border-color: var(--loss-color, #7c8cf8); background: rgba(124, 140, 248, 0.08); color: #e8e8f0; }
    .ctrl-btn { padding: 8px 18px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { border-color: #3a3a50; background: #16161f; }
    .ctrl-btn.active { border-color: #7c8cf8; background: rgba(124, 140, 248, 0.1); color: #e8e8f0; }
    .ctrl-sep { width: 1px; background: #1e1e2a; align-self: stretch; margin: 0 4px; }
    .prediction-display { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.85rem; color: #9898ac; margin-bottom: 12px; text-align: center; }
    #prediction-val { color: #7c8cf8; font-weight: 600; }
    .info-row { display: flex; gap: 14px; align-items: flex-start; }
    .info-panel { flex: 1; background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 14px; min-width: 0; }
    .section-label { font-size: 0.65rem; color: #666880; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    #math-panel { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; color: #9898ac; line-height: 1.8; }
    #insight-box { padding: 10px 12px; background: rgba(124, 140, 248, 0.04); border-left: 3px solid #7c8cf8; border-radius: 0 6px 6px 0; font-size: 0.82rem; line-height: 1.5; color: #9898ac; }
    @media (max-width: 700px) { .info-row { flex-direction: column; } }
    @media (max-width: 480px) { body { padding: 24px 12px; } h1 { font-size: 1.3rem; } }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>Loss Functions</h1>
    <p class="subtitle">Drag the prediction point horizontally to see how each loss function responds. Toggle functions on/off and switch the true label to compare behaviors.</p>
    <div class="controls">
      <button class="loss-btn active" data-loss="step" style="--loss-color:#f43f5e">Step (0/1)</button>
      <button class="loss-btn active" data-loss="mse" style="--loss-color:#7c8cf8">MSE</button>
      <button class="loss-btn active" data-loss="sigmoid" style="--loss-color:#a78bfa">Sigmoid</button>
      <button class="loss-btn active" data-loss="cross-entropy" style="--loss-color:#f59e0b">Cross-Entropy</button>
      <button class="loss-btn active" data-loss="softmax-ce" style="--loss-color:#34d399">Softmax+CE</button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn active" id="btn-label-1">y = 1</button>
      <button class="ctrl-btn" id="btn-label-0">y = 0</button>
    </div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div class="prediction-display" id="prediction-val"></div>
    <div class="info-row">
      <div class="info-panel">
        <div class="section-label">Formulas &amp; Values</div>
        <div id="math-panel"></div>
      </div>
      <div class="info-panel">
        <div id="insight-box"></div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
