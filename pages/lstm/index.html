<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="LSTM">
  <meta property="og:description" content="Interactive demo of LSTM gates — see how forget, input, and output gates control memory flow.">
  <meta property="og:url" content="https://emmaleonhart.com/lstm/">
  <title>LSTM — Long Short-Term Memory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #d0d0dc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
    .container { max-width: 960px; width: 100%; }
    .back { display: inline-block; color: #7c8cf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e8e8f0; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { color: #8888a0; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .canvas-wrap { width: 100%; border: 1px solid #1e1e2a; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #0a0a0f; }
    canvas { display: block; width: 100%; touch-action: none; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .ctrl-btn { padding: 8px 18px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { border-color: #3a3a50; background: #16161f; }
    .ctrl-btn.active { border-color: #7c8cf8; background: rgba(124, 140, 248, 0.1); color: #e8e8f0; }
    .ctrl-sep { width: 1px; background: #1e1e2a; align-self: stretch; margin: 0 4px; }
    .main-layout { display: flex; gap: 14px; align-items: flex-start; }
    .panel-left { flex: 0 0 200px; background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 14px; }
    .panel-right { flex: 1; min-width: 0; background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 14px; max-height: 500px; overflow-y: auto; }
    .section-label { font-size: 0.65rem; color: #666880; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .slider-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .slider-label { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; color: #b0b0cc; min-width: 34px; }
    .slider-val { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; width: 40px; text-align: right; color: #34d399; }
    input[type="range"] { flex: 1; accent-color: #7c8cf8; height: 4px; }
    .gate-card { background: #0e0e16; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid #1e1e2a; transition: all 0.2s; }
    .gate-card.active { border-left-width: 3px; background: rgba(255,255,255,0.02); }
    .gate-name { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
    .gate-formula { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.72rem; color: #9898ac; margin-bottom: 4px; }
    .gate-desc { font-size: 0.78rem; color: #666880; line-height: 1.4; }
    .insight-box { margin-top: 14px; padding: 10px 12px; background: rgba(56, 189, 248, 0.04); border-left: 3px solid #38bdf8; border-radius: 0 6px 6px 0; font-size: 0.82rem; line-height: 1.5; color: #9898ac; }
    @media (max-width: 700px) { .main-layout { flex-wrap: wrap; } .panel-left { flex: 1 1 100%; } .panel-right { flex: 1 1 100%; } }
    @media (max-width: 480px) { body { padding: 24px 12px; } h1 { font-size: 1.3rem; } }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>LSTM &mdash; Long Short-Term Memory</h1>
    <p class="subtitle">An LSTM cell has four gates that control what to remember, what to forget, and what to output. Step through each gate to see how the cell state (memory highway) and hidden state are computed.</p>
    <div class="controls">
      <button class="ctrl-btn active" id="btn-all">Show all</button>
      <button class="ctrl-btn" id="btn-prev-step">&larr; Prev step</button>
      <button class="ctrl-btn" id="btn-next-step">Next step &rarr;</button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn" id="btn-randomize">Randomize weights</button>
    </div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div class="main-layout">
      <div class="panel-left">
        <div class="section-label">Inputs</div>
        <div class="slider-row">
          <span class="slider-label">x(t)</span>
          <input type="range" id="slider-x" min="-1" max="1" step="0.05">
          <span class="slider-val" id="slider-x-val">0.50</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">h(t-1)</span>
          <input type="range" id="slider-h" min="-1" max="1" step="0.05">
          <span class="slider-val" id="slider-h-val">0.30</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">c(t-1)</span>
          <input type="range" id="slider-c" min="-2" max="2" step="0.05">
          <span class="slider-val" id="slider-c-val">0.70</span>
        </div>
      </div>
      <div class="panel-right">
        <div class="section-label">Gate computations</div>
        <div id="math-panel"></div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
